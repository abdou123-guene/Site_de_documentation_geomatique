<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Carte web – Guene Abdou</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet CSS (OBLIGATOIRE) -->
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-sA+z0pSUC7kCw7trN6t2YpV7KQh6cGZ9E+Y5x0i0Xbw="
        crossorigin=""
      height: 60px;
            background: #1f2937;
            color: white;
            text-align: center;
            line-height: 60px;
            font-size: 18px;
        }

        #map {
            height: calc(100% - 60px);
            width: 100%;
        }
    </style>
</head>

<body>

<header>
    Carte web interactive – Guene Abdou (Géomaticien)
</header>

<div id="map"></div>

<!-- Leaflet JS (OBLIGATOIRE) -->
<script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-o9N1j7kD8I+Zk2UNkY5Yq55Y7N7M0kzQ2Y+9wWc0CjU="
    crossorigin=""
, 11);

    // Fond de carte OpenStreetMap
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // Marqueur
    L.marker([49.2561, 4.0317])
        .addTo(map)
        .bindPopup("<b>Châlons-en-Champagne</b><br>AUDC")
        .openPopup();
</script>

</body>
</html>
