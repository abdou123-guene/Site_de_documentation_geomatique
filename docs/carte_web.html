<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Carte web – Guene Abdou</title>

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        header {
            height: 60px;
            background: #1f2937;
            color: white;
            text-align: center;
            line-height: 60px;
            font-size: 18px;
        }

        #map {
            height: calc(100% - 60px);
            width: 100%;
        }
    </style>
</head>

<body>

<header>
    Carte web interactive – Guene Abdou (Géomaticien)
</header>

<div id="map"></div>

<!-- Leaflet JS -->
<script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-Vq7gFZ7MRz5wG2Jd0LzQ3M+6p6KcdpQYfH+yt1kPZhA="
  crossorigin=""
></script>

<script>
    // 1. Création de la carte
    var map = L.map('map').setView([49.2561, 4.0317], 10);
    // Coordonnées : Châlons-en-Champagne

    // 2. Fond de carte OpenStreetMap
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // 3. Ajout d'un marqueur
    var marker = L.marker([49.2561, 4.0317]).addTo(map);
    marker.bindPopup("<b>Châlons-en-Champagne</b><br>AUDC").openPopup();
</script>

</body>
</html>
