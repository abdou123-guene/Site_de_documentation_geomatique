<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Carte avancée – Châlons</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html, body { margin:0; height:100%; }
#map { height:100%; }

/* Interface */
#panel {
  position:absolute;
  top:10px;
  left:10px;
  z-index:1000;
  background:white;
  padding:10px;
  border-radius:6px;
  box-shadow:0 0 5px rgba(0,0,0,0.3);
}

input {
  width:200px;
  padding:5px;
}

button {
  margin-top:5px;
  padding:5px;
}
</style>
</head>

<body>

<div id="panel">
  <input id="search" type="text" placeholder="Rechercher NOM..." list="liste"/>
  <datalist id="liste"></datalist>
  <br>
  <button onclick="locateUser()">📍 Ma position</button>
</div>

<div id="map"></div>

<script>

/* =========================
   CARTE
========================= */
var map = L.map('map').setView([48.9695, 4.3470], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution:'© OpenStreetMap'
}).addTo(map);

let geoLayer;
let noms = [];

/* =========================
   GEOJSON
========================= */
fetch('images/data/chalons.geojson?nocache=' + new Date().getTime())
.then(res => res.json())
.then(data => {

  geoLayer = L.geoJSON(data, {

    style:{
      color:"#cc0000",
      weight:2,
      fillColor:"#ff9999",
      fillOpacity:0.4
    },

    onEachFeature:function(feature, layer){

      /* stocker noms */
      if(feature.properties.NOM){
        noms.push(feature.properties.NOM);
      }

      /* popup */
      let table="<table>";
      for(let key in feature.properties){
        table += "<tr><td><b>"+key+"</b></td><td>"+feature.properties[key]+"</td></tr>";
      }
      table+="</table>";

      layer.bindPopup(table);
    }

  }).addTo(map);

  map.fitBounds(geoLayer.getBounds());

  /* remplir autocompletion */
  let list=document.getElementById("liste");
  noms.forEach(n=>{
    let opt=document.createElement("option");
    opt.value=n;
    list.appendChild(opt);
  });

});

/* =========================
   RECHERCHE
========================= */
document.getElementById("search").addEventListener("input",function(){

  let val=this.value.toLowerCase();

  geoLayer.eachLayer(function(layer){

    let nom = layer.feature.properties.NOM;

    if(nom && nom.toLowerCase().includes(val)){

      map.fitBounds(layer.getBounds());
      layer.openPopup();
    }

  });

});

/* =========================
   GEOLOCALISATION
========================= */
function locateUser(){

  map.locate({setView:true, maxZoom:14});

  function onLocationFound(e){
    let r = e.accuracy;

    L.marker(e.latlng).addTo(map)
      .bindPopup("Vous êtes ici").openPopup();

    L.circle(e.latlng, r).addTo(map);
  }

  map.on('locationfound', onLocationFound);

}

</script>

</body>
</html>
