<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Carte SIG – Châlons</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    #logo {
      position: absolute;
      bottom: 15px;
      right: 15px;
      z-index: 1000;
      background: white;
      padding: 6px;
      border-radius: 6px;
    }

    #logo img {
      width: 80px;
    }
  </style>
</head>

<body>

<div id="map"></div>

<div id="logo">
  <img src="images/logo.jpg" alt="logo">
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* =========================
   INITIALISATION CARTE
========================= */

var map = L.map('map').setView([48.9695, 4.3470], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);


/* =========================
   GEOJSON + POPUP ATTRIBUTS
========================= */

fetch('images/data/chalons.geojson?nocache=' + new Date().getTime())
  .then(function(response) {
    return response.json();
  })
  .then(function(data) {

    console.log("GeoJSON chargé ✅");

    var layer = L.geoJSON(data, {

      style: {
        color: "#cc0000",
        weight: 2,
        fillColor: "#ff9999",
        fillOpacity: 0.4
      },

      onEachFeature: function(feature, layer) {

        let table = "<table style='border-collapse:collapse;'>";

        for (let key in feature.properties) {
          table += "<tr>" +
                   "<td style='border:1px solid #ccc;padding:4px;'><b>" + key + "</b></td>" +
                   "<td style='border:1px solid #ccc;padding:4px;'>" + feature.properties[key] + "</td>" +
                   "</tr>";
        }

        table += "</table>";

        layer.bindPopup(table);
      }

    }).addTo(map);

    map.fitBounds(layer.getBounds());

  })
  .catch(function(error) {
    console.error("Erreur GEOJSON ❌ :", error);
  });

</script>

</body>
</html>
