<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Carte GeoNetwork – Guene Abdou</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Script GeoNetwork (OBLIGATOIRE) -->
  <script src="https://cdn.jsdelivr.net/gh/geonetwork/geonetwork-ui@wc-dist-main/gn-wc.js<style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    header {
      height: 60px;
      background: #1f2937;
      color: white;
      text-align: center;
      line-height: 60px;
      font-size: 18px;
    }

    #map-container {
      height: calc(100% - 60px);
    }
  </style>
</head>

<body>

<header>
  Carte GeoNetwork – BD TOPO IGN (Guene Abdou)
</header>

<div id="map-container">
  <gn-dataset-view-map
      api-url="https://data.geopf.fr/catalog"
      dataset-id="IGNF_BD-TOPO"
      primary-color="#0f4395"
      secondary-color="#8bc832"
      main-color="#555"
      background-color="#fdfbff"
      main-font="'Inter', sans-serif"
      title-font="'DM Serif Display', serif"
      style="width:100%; height:100%; display:block;"
  ></gn-dataset-view-map>
</div>

</body>
</html>
