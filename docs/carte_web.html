<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Carte animée – AUDC</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        header {
            height: 60px;
            background: #1f2937;
            color: white;
            text-align: center;
            line-height: 60px;
            font-size: 18px;
            font-family: Arial, sans-serif;
        }

        #map {
            height: calc(100% - 60px);
            width: 100%;
        }
    </style>
</head>

<body>

<header>
    Carte animée – De la France vers l’AUDC (Châlons-en-Champagne)
</header>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // 📍 Coordonnées
    const franceCenter = [46.603354, 1.888334]; // Centre France
    const audc = [48.969509, 4.347039];         // AUDC

    // 1️⃣ Initialisation de la carte (vue France)
    var map = L.map('map').setView(franceCenter, 6);

    // 2️⃣ Fond de carte OSM
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // 3️⃣ Lancement de l'animation après 2 secondes
    setTimeout(() => {
        map.flyTo(audc, 13, {
            animate: true,
            duration: 4   // durée de l’animation (secondes)
        });
    }, 2000);

    // 4️⃣ Ajout du marqueur AUDC après l'arrivée
    setTimeout(() => {
        L.marker(audc)
            .addTo(map)
            .bindPopup("<b>AUDC</b><br>Châlons-en-Champagne")
            .openPopup();
    }, 6000);
</script>

</body>
</html>
