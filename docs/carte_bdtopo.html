<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Graphique BD TOPO – GeoNetwork</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ Script CORRECT -->
  <script type="module" src="https://cdn.jsdelivr.net/gh/geonetwork/geonetwork-ui@wc-dist-main/gn-wc.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    header {
      height: 60px;
      background: #1f2937;
      color: white;
      text-align: center;
      line-height: 60px;
      font-size: 18px;
    }

    #chart-container {
      height: calc(100% - 60px);
      padding: 10px;
    }

    gn-dataset-view-chart {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>

<header>
  Graphique BD TOPO – GeoNetwork
</header>

<div id="chart-container">
  <gn-dataset-view-chart
      api-url="https://data.geopf.fr/catalog"
      dataset-id="IGNF_BD-TOPO"
      aggregation="sum"
      x-property="cleabs"
      y-property="precision_planimetrique"
      chart-type="bar"
      primary-color="#0f4395"
      secondary-color="#8bc832"
      main-color="#555"
      background-color="#fdfbff"
      main-font="'Inter', sans-serif"
      title-font="'DM Serif Display', serif">
  </gn-dataset-view-chart>
</div>

</body>
</html>
